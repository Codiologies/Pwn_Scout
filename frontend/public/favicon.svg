<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A121C"/>
      <stop offset="100%" stop-color="#03060B"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#4D9FFF"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="url(#bg)"/>
  <!-- Corner brackets (HUD style) -->
  <path d="M2 8 L2 2 L8 2" fill="none" stroke="#00E5FF" stroke-width="1.5" opacity="0.6"/>
  <path d="M24 2 L30 2 L30 8" fill="none" stroke="#00E5FF" stroke-width="1.5" opacity="0.6"/>
  <path d="M2 24 L2 30 L8 30" fill="none" stroke="#00E5FF" stroke-width="1.5" opacity="0.6"/>
  <path d="M24 30 L30 30 L30 24" fill="none" stroke="#00E5FF" stroke-width="1.5" opacity="0.6"/>
  <!-- Crosshair / target reticle -->
  <circle cx="16" cy="16" r="7" fill="none" stroke="url(#glow)" stroke-width="1.5" opacity="0.8"/>
  <circle cx="16" cy="16" r="2.5" fill="#00E5FF"/>
  <!-- Crosshair lines -->
  <line x1="16" y1="5" x2="16" y2="8" stroke="#00E5FF" stroke-width="1" opacity="0.5"/>
  <line x1="16" y1="24" x2="16" y2="27" stroke="#00E5FF" stroke-width="1" opacity="0.5"/>
  <line x1="5" y1="16" x2="8" y2="16" stroke="#00E5FF" stroke-width="1" opacity="0.5"/>
  <line x1="24" y1="16" x2="27" y2="16" stroke="#00E5FF" stroke-width="1" opacity="0.5"/>
</svg>
